version: 0.1
component: command
timeoutInSeconds: 3600
shell: bash

env:
  variables:
    OKE_CLUSTER_ID: "${okeClusterId}"
    OCI_REGION: "${regionRuntime}"
    APP_BASE_URL: "${appBaseUrl}"
    APP_RESOLVE_IP: "${appResolveIp}"
    APP_NAMESPACE: "${appNamespace}"
    SERVICE_TYPE: "${serviceType}"
    APP_HOST: "${appHost}"
    USE_NGINX_INGRESS: "${useNginxIngress}"
    IMAGE_REPOSITORY: "${imageRepository}"
    IMAGE_REGISTRY_ENDPOINT: "${imageRegistryEndpoint}"
    IMAGE_REGISTRY_USERNAME: "${imageRegistryUsername}"
    IMAGE_REGISTRY_PASSWORD_SECRET_OCID: "${imageRegistryPasswordSecretOcid}"
    RELEASE_VERSION: "${releaseVersion}"
    RUNTIME_DB_URL: "${runtimeDbUrl}"
    RUNTIME_DB_USERNAME: "${runtimeDbUsername}"
    RUNTIME_DB_PASSWORD_SECRET_OCID: "${runtimeDbPasswordSecretOcid}"
    POSTGRESQL_DB_SYSTEM_ID: "${postgresqlDbSystemId}"
    TLS_PUBLIC_CERTIFICATE_SECRET_OCID: "${tlsPublicCertificateSecretOcid}"
    TLS_PRIVATE_KEY_SECRET_OCID: "${tlsPrivateKeySecretOcid}"
    TLS_CA_CERTIFICATE_SECRET_OCID: "${tlsCaCertificateSecretOcid}"
    POST_SWITCH_OBSERVATION_SECONDS: "${postSwitchObservationSeconds}"
    POST_SWITCH_OBSERVATION_INTERVAL_SECONDS: "${postSwitchObservationIntervalSeconds}"
    COMMIT_SHA: "${COMMIT_SHA}"
    REPOSITORY_URL: "https://github.com/albertattard/wort-werk.git"

steps:
  - type: Command
    name: Install kubectl and envsubst
    command: |
      set -euo pipefail

      export PATH="$HOME/bin:$PATH"
      mkdir -p "$HOME/bin"

      if ! command -v kubectl >/dev/null 2>&1; then
        curl -Lo kubectl "https://dl.k8s.io/release/v1.32.2/bin/linux/amd64/kubectl"
        install -m 0755 kubectl "$HOME/bin/kubectl"
      fi

      if ! command -v envsubst >/dev/null 2>&1; then
        if command -v microdnf >/dev/null 2>&1; then
          microdnf install -y gettext
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y gettext
        else
          yum install -y gettext
        fi
      fi

      if ! command -v git >/dev/null 2>&1; then
        if command -v microdnf >/dev/null 2>&1; then
          microdnf install -y git
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y git
        else
          yum install -y git
        fi
      fi

  - type: Command
    name: Run OKE blue-green rollout
    command: |
      set -euo pipefail
      export OCI_CLI_AUTH=resource_principal
      export PATH="$HOME/bin:$PATH"
      if [[ -z "${APP_IMAGE:-}" && -n "${IMAGE_REPOSITORY:-}" && -n "${RELEASE_VERSION:-}" ]]; then
        export APP_IMAGE="${IMAGE_REPOSITORY}:${RELEASE_VERSION}"
      fi
      if [[ -z "${COMMIT_SHA:-}" || "${COMMIT_SHA}" == "null" ]]; then
        echo "Missing required deployment variable: COMMIT_SHA" >&2
        exit 1
      fi
      WORKDIR="$(mktemp -d)"
      git init "$WORKDIR"
      git -C "$WORKDIR" remote add origin "$REPOSITORY_URL"
      git -C "$WORKDIR" fetch --depth 1 origin "$COMMIT_SHA"
      git -C "$WORKDIR" checkout --detach FETCH_HEAD
      cd "$WORKDIR"
      ./infrastructure/oci/oke-devops/deploy-bluegreen.sh
