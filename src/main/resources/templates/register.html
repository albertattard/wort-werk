<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrierung | Wort-Werk</title>
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #faf6ef, #e6f2f1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: min(420px, 92vw);
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.12);
            padding: 24px;
        }

        h1 {
            margin: 0 0 16px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: 600;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #b6b6b6;
            margin-top: 4px;
        }

        button {
            margin-top: 16px;
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            background: #0f766e;
            color: #fff;
        }

        button:hover {
            background: #115e59;
        }

        .msg {
            margin-top: 12px;
            font-weight: 600;
            color: #b71c1c;
        }

        .small {
            margin-top: 14px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
<section class="card">
    <h1>Registrierung</h1>
    <form method="post" action="/register">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="username">Benutzername</label>
        <input id="username" name="username" type="text" autocomplete="username" required data-testid="register-username">
        <label for="password">Passwort</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required data-testid="register-password">
        <button type="submit" data-testid="register-submit">Konto erstellen</button>
    </form>
    <p class="msg" th:if="${error}" th:text="${error}" data-testid="register-error"></p>
    <p class="small">Bereits registriert? <a href="/login">Zur Anmeldung</a></p>
</section>
</body>
</html>
