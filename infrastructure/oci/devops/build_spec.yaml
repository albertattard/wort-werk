version: 0.1
component: build
timeoutInSeconds: 3600
shell: bash

env:
  exportedVariables:
    - COMMIT_SHA
    - IMAGE_TAG

steps:
  - type: Command
    name: Resolve release metadata
    command: |
      set -euo pipefail

      COMMIT_SHA="${OCI_PRIMARY_SOURCE_COMMIT_HASH:-$(git rev-parse HEAD)}"
      IMAGE_TAG="$(printf '%s' "${COMMIT_SHA}" | cut -c1-12)"
      RELEASE_VERSION="${IMAGE_TAG}"

      export COMMIT_SHA IMAGE_TAG RELEASE_VERSION

      cat > release-metadata.env <<EOF
      COMMIT_SHA=${COMMIT_SHA}
      IMAGE_TAG=${IMAGE_TAG}
      RELEASE_VERSION=${RELEASE_VERSION}
      EOF

  - type: Command
    name: Package release bundle
    command: |
      set -euo pipefail
      release_ref="${OCI_PRIMARY_SOURCE_COMMIT_HASH:-HEAD}"
      git archive --format=tar.gz --output=release-bundle.tgz "${release_ref}"

  - type: Command
    name: Upload release handoff objects
    command: |
      set -euo pipefail

      export OCI_CLI_AUTH=resource_principal

      NAMESPACE="$(oci os ns get --query 'data' --raw-output)"
      BUCKET_NAME="wort-werk-release-handoff"
      OBJECT_PREFIX="releases/${RELEASE_VERSION}"

      oci os object put \
        --namespace "${NAMESPACE}" \
        --bucket-name "${BUCKET_NAME}" \
        --name "${OBJECT_PREFIX}/release-bundle.tgz" \
        --file release-bundle.tgz \
        --force

      oci os object put \
        --namespace "${NAMESPACE}" \
        --bucket-name "${BUCKET_NAME}" \
        --name "${OBJECT_PREFIX}/release-metadata.env" \
        --file release-metadata.env \
        --force
