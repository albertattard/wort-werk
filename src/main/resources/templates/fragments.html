<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="interaction(state)">
    <style>
        .status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            font-weight: 600;
        }

        .image-wrap {
            background: #f8f8f8;
            border-radius: 12px;
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .image-wrap img {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
        }

        .choices {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .choices form {
            margin: 0;
        }

        .choices button {
            min-width: 68px;
        }

        .question-noun {
            text-align: center;
            margin: 10px 0 16px;
            font-size: 3rem;
            font-weight: 600;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 12px;
            font-size: 1.05rem;
            cursor: pointer;
            background: #0f766e;
            color: #fff;
        }

        button:hover {
            background: #115e59;
        }

        button.correct-answer {
            background: #2e7d32;
        }

        button.wrong-answer {
            background: #b71c1c;
        }

        .feedback {
            margin-top: 14px;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .next-row {
            margin-top: 14px;
        }

        .results {
            text-align: center;
            padding: 30px 0;
        }

        .results .score {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        @media (max-width: 700px) {
            .choices {
                gap: 10px;
            }
        }
    </style>

    <div th:if="${!state.finished}">
        <div class="status" data-testid="quiz-status">
            <span data-testid="round-label" th:text="|Runde ${state.currentRound} von ${state.totalRounds}|">Runde 1 von 10</span>
            <span data-testid="score-label" th:text="|Punkte: ${state.score}|">Punkte: 0</span>
        </div>

        <div class="image-wrap" data-testid="question-image-wrap">
            <img data-testid="question-image" th:src="@{${'/' + state.currentQuestion.imagePath}}" th:alt="${state.currentQuestion.noun}">
        </div>

        <p class="question-noun" data-testid="question-noun" th:text="${state.currentQuestion.noun}">Objektname</p>

        <div class="choices">
            <form method="post" action="/answer">
                <input type="hidden" name="article" value="der">
                <button data-testid="answer-der" type="submit"
                        th:classappend="${state.isCorrectHighlighted('der')} ? ' correct-answer' : (${state.isWrongSelection('der')} ? ' wrong-answer' : '')">der</button>
            </form>
            <form method="post" action="/answer">
                <input type="hidden" name="article" value="die">
                <button data-testid="answer-die" type="submit"
                        th:classappend="${state.isCorrectHighlighted('die')} ? ' correct-answer' : (${state.isWrongSelection('die')} ? ' wrong-answer' : '')">die</button>
            </form>
            <form method="post" action="/answer">
                <input type="hidden" name="article" value="das">
                <button data-testid="answer-das" type="submit"
                        th:classappend="${state.isCorrectHighlighted('das')} ? ' correct-answer' : (${state.isWrongSelection('das')} ? ' wrong-answer' : '')">das</button>
            </form>
        </div>

        <div th:if="${state.hasFeedback()}">
            <p class="feedback" data-testid="feedback" th:text="${state.feedback}"></p>
        </div>
    </div>

    <div th:if="${state.finished}" class="results" data-testid="results">
        <p class="score" data-testid="final-score" th:text="|Endstand: ${state.score} / ${state.totalRounds}|">Endstand: 0 / 10</p>
        <form method="post" action="/restart">
            <button data-testid="restart-button" type="submit">Neu starten</button>
        </form>
    </div>
</div>
</body>
</html>
