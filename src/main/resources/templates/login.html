<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anmeldung | Wort-Werk</title>
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #faf6ef, #e6f2f1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: min(420px, 92vw);
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.12);
            padding: 24px;
        }

        h1 {
            margin: 0 0 16px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: 600;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #b6b6b6;
            margin-top: 4px;
        }

        button {
            margin-top: 16px;
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            background: #0f766e;
            color: #fff;
        }

        button:hover {
            background: #115e59;
        }

        .msg {
            margin-top: 12px;
            font-weight: 600;
        }

        .ok {
            color: #2e7d32;
        }

        .err {
            color: #b71c1c;
        }

        .small {
            margin-top: 14px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
<section class="card">
    <h1 data-testid="login-title">Anmeldung</h1>
    <form method="post" action="/login">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="username">Benutzername</label>
        <input id="username" name="username" type="text" autocomplete="username" required data-testid="login-username">
        <label for="password">Passwort</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required data-testid="login-password">
        <button type="submit" data-testid="login-submit">Einloggen</button>
    </form>
    <p class="msg ok" th:if="${param.registered}" data-testid="login-registered">Registrierung erfolgreich. Bitte einloggen.</p>
    <p class="msg err" th:if="${param.error}" data-testid="login-error">Anmeldung fehlgeschlagen.</p>
    <p class="msg ok" th:if="${param.logout}" data-testid="login-logout">Abgemeldet.</p>
    <p class="small">Noch kein Konto? <a href="/register">Registrieren</a></p>
</section>
</body>
</html>
