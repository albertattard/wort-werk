<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wort-Werk</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #faf6ef, #e6f2f1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: min(760px, 92vw);
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.12);
            padding: 24px;
        }

        .app-footer {
            margin-top: 20px;
            padding-top: 14px;
            border-top: 1px solid #e7eceb;
            color: #5b6765;
            font-size: 0.9rem;
            text-align: center;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.7rem;
        }

        .muted {
            color: #4b4b4b;
            margin: 0 0 16px;
        }
    </style>
</head>
<body>
<section class="card">
    <h1>Wort-Werk</h1>
    <p class="muted">Artikeltrainer mit Bildimpulsen</p>
    <form method="post" action="/logout">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" style="margin-bottom: 12px;">Abmelden</button>
    </form>
    <div id="quiz-interaction" th:replace="~{fragments :: interaction(state=${state})}"></div>
    <footer th:replace="~{fragments :: appFooter(buildLabel=${buildLabel})}"></footer>
</section>
</body>
</html>
